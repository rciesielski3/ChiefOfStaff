name: Export Latest News
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: export-latest-news-${{ github.ref }}
  cancel-in-progress: false

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs AFTER the Daily Brief workflow completes successfully.
# Previously relied on a 5-minute time buffer, which could lead to race conditions.
#
# Race condition mitigation strategy:
# 1. Uses workflow_run trigger to wait for Daily Brief completion
# 2. Workflow_run sequencing prevents M4 stale reads
# 3. Status check verifies Daily Brief success before proceeding
# 4. Auto-merge ensures minimal latency when PR changes are committed
#
# This ensures:
# - Export workflow only reads data after Daily Brief has completed
# - No concurrent writes to canonical articles during export
# - Proper sequencing eliminates 5-minute buffer race condition
#
# Execution sequence:
# 1. Daily Brief workflow runs (schedule or manual trigger)
# 2. Daily Brief creates PR and enables auto-merge
# 3. PR merge is observed by workflow_run trigger
# 4. Export Latest News workflow begins automatically
# 5. Export completes with fresh data from knowledge layer

on:
  workflow_run:
    workflows: ["Daily Brief"]
    types:
      - completed
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      ENABLE_NOTIFICATIONS: true
    steps:
      - uses: actions/checkout@v4

      - name: Check Daily Brief Status
        if: github.event.workflow_run.conclusion == 'failure'
        run: exit 1

      - name: Verify QA_NEWS_TOKEN
        run: |
          # Test token access to qa-news repo
          echo "Testing token access..."
          curl -I -H "Authorization: token ${{ secrets.QA_NEWS_TOKEN }}" \
            https://api.github.com/repos/rciesielski3/qa-news
          echo "Token test completed"

      - name: Checkout qa-news repository
        uses: actions/checkout@v4
        with:
          repository: rciesielski3/qa-news
          token: ${{ secrets.QA_NEWS_TOKEN }}
          path: qa-news

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export Latest News
        run: npx ts-node src/cli/export-latest-news.ts

      - name: Commit latest.json
        run: |
          cd qa-news
          git config user.name "PAIOS Bot"
          git config user.email "bot@paios.local"

          git add public/latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update latest.json from knowledge layer"
          
      - name: Create Pull Request
        id: pr
        run: |
          cd qa-news

          # Verify we have changes
          if git diff --quiet --exit-code main public/latest.json; then
            echo "No changes to push"
            exit 0
          fi

          # Clear any conflicting credential headers from previous checkout
          git config --local --unset http.https://github.com/.extraheader || true

          # Configure git with the token for authentication
          echo "Setting up git authentication..."
          git config --local credential.helper store
          echo "https://oauth2:${{ secrets.QA_NEWS_TOKEN }}@github.com" > ~/.git-credentials

          # Update remote URL to use token embedded authentication
          git remote set-url origin "https://oauth2:${{ secrets.QA_NEWS_TOKEN }}@github.com/rciesielski3/qa-news.git"

          git checkout -b automation/latest-news
          git push -u origin automation/latest-news --force-with-lease

          # Create PR using GitHub CLI
          gh pr create \
            --repo rciesielski3/qa-news \
            --base main \
            --head automation/latest-news \
            --title "chore: update latest.json" \
            --body "Automated update from Export Latest News workflow."
        env:
          GH_TOKEN: ${{ secrets.QA_NEWS_TOKEN }}

      - name: Enable auto-merge
        id: auto_merge
        continue-on-error: true
        run: |
          # Get the PR number from the most recent PR
          PR_NUMBER=$(gh pr list --repo rciesielski3/qa-news --head automation/latest-news --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ]; then
            gh pr merge --repo rciesielski3/qa-news --auto --squash "$PR_NUMBER"
            echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.QA_NEWS_TOKEN }}

      - name: Log Export Count
        id: export_count
        run: |
          EXPORT_COUNT=$(jq '.articles | length' qa-news/public/latest.json 2>/dev/null || echo 0)
          echo "count=$EXPORT_COUNT" >> $GITHUB_OUTPUT
          echo "Articles exported: $EXPORT_COUNT"

