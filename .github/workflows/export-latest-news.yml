name: Export Latest News
permissions:
  contents: write
  pull-requests: write

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs at 08:05 UTC, 5 minutes after daily-brief.yml (08:00 UTC).
# The 5-minute gap provides a buffer to allow the Daily Brief workflow to complete
# and push changes to the main repository before this workflow executes.
#
# Known race condition: If Daily Brief takes longer than 5 minutes or encounters
# network issues, this workflow may attempt to export and push before Daily Brief
# has completed, resulting in:
# - Potential merge conflicts in git push operations
# - Stale data being exported if Daily Brief is still running
# - Concurrent pushes to the qa-news repository
#
# Current mitigation: The 5-minute delay provides a time buffer for completion.
# This should be monitored in production, and consider implementing:
# - Workflow sequencing via gh workflow run --wait (future enhancement)
# - Locking mechanism for data export (future enhancement)

on:
  schedule:
    - cron: '5 8 * * *'  # 08:05 UTC daily (after Daily Brief)
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export Latest News
        run: npx ts-node src/cli/export-latest-news.ts

      - name: Commit latest.json
       run: |
          cd qa-news
          git config user.name "PAIOS Bot"
          git config user.email "bot@paios.local"

          git add public/latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update latest.json from knowledge layer"
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: qa-news
          commit-message: "chore: update latest.json from knowledge layer"
          title: "chore: update latest.json"
          body: "Automated update from Export Latest News workflow."
          branch: "automation/latest-news"
          delete-branch: true
