name: Notify Telegram

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["Daily Brief", "Export Latest News"]
    types:
      - completed
  workflow_dispatch:  # Manual trigger for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      ENABLE_NOTIFICATIONS: true
    steps:
      - uses: actions/checkout@v4

      - name: Determine Workflow Context
        id: context
        run: |
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "status=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT

      - name: Get Previous Article Count
        id: previous_count
        if: steps.context.outputs.workflow_name == 'Daily Brief'
        continue-on-error: true
        run: |
          # For MVP, use a simple approach: store count in a workflow variable
          # In future, could use artifacts or GitHub environment variables
          # For now, default to current count (no comparison on first run)
          PREV_COUNT=${PREV_ARTICLE_COUNT:-0}
          echo "count=$PREV_COUNT" >> $GITHUB_OUTPUT
        env:
          PREV_ARTICLE_COUNT: ${{ vars.PREV_ARTICLE_COUNT || '0' }}

      - name: Get Daily-Brief Artifact
        id: brief_count
        if: |
          steps.context.outputs.workflow_name == 'Daily Brief' &&
          steps.context.outputs.status == 'success'
        continue-on-error: true
        run: |
          # Download the named artifact from the completed daily-brief workflow.
          # Passing -n/--name downloads that single artifact's files directly
          # into --dir; without it, gh nests files under a
          # /tmp/artifacts/article-count-data/ subdirectory, which is why the
          # path check below used to always miss.
          gh run download ${{ steps.context.outputs.run_id }} \
            --repo ${{ github.repository }} \
            --name article-count-data \
            --dir /tmp/artifacts || true

          # Extract article count from canonical_articles.ndjson if available.
          # NOTE: no git-based fallback here. The workflow_run event's
          # head_commit SHA refers to daily-brief.yml's PR branch commit,
          # which no longer exists in main's history after the PR is
          # squash-merged (and this checkout is shallow), so `git show
          # <sha>:...` would fail unreliably. If the artifact is missing we
          # report 0 and warn rather than guessing from an unreachable commit.
          if [ -f "/tmp/artifacts/canonical_articles.ndjson" ]; then
            CURRENT_COUNT=$(wc -l < /tmp/artifacts/canonical_articles.ndjson || echo 0)
          else
            echo "::warning::article-count-data artifact not found; defaulting article count to 0"
            CURRENT_COUNT=0
          fi

          echo "current_count=$CURRENT_COUNT" >> $GITHUB_OUTPUT
          echo "Current article count: $CURRENT_COUNT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Smart Success Notification (Daily Brief)
        if: |
          steps.context.outputs.workflow_name == 'Daily Brief' &&
          steps.context.outputs.status == 'success' &&
          env.ENABLE_NOTIFICATIONS == 'true'
        continue-on-error: true
        run: |
          # Always alert if count is 0 (silent failure)
          if [ "$CURRENT_COUNT" -eq 0 ]; then
            MESSAGE="⚠️ Daily Brief: 0 articles fetched (check RSS feeds)"
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -d text="$MESSAGE" \
              -d parse_mode="HTML"
            exit 0
          fi

          # Calculate percentage change
          if [ "$PREV_COUNT" -eq 0 ]; then
            # First run, always notify
            SHOULD_NOTIFY=true
            CHANGE_PCT=100
          else
            # Calculate percentage change
            CHANGE=$((CURRENT_COUNT - PREV_COUNT))
            CHANGE_PCT=$(( (CHANGE * 100) / PREV_COUNT ))

            # Alert if change > 20% or < -20%
            if [ "$CHANGE_PCT" -gt 20 ] || [ "$CHANGE_PCT" -lt -20 ]; then
              SHOULD_NOTIFY=true
            else
              SHOULD_NOTIFY=false
            fi
          fi

          if [ "$SHOULD_NOTIFY" = true ]; then
            MESSAGE="✅ Daily Brief: $CURRENT_COUNT articles fetched (change: $CHANGE_PCT%)"
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -d text="$MESSAGE" \
              -d parse_mode="HTML"
          else
            echo "Article count stable ($CURRENT_COUNT, $CHANGE_PCT% change). Skipping notification."
          fi
        env:
          # Passed as env vars rather than spliced directly into the script
          # (the previous `CURRENT_COUNT=${{ ... }}` form injects the raw
          # step output text into the bash script before it runs, which is
          # a script-injection risk if the value ever contains shell
          # metacharacters).
          CURRENT_COUNT: ${{ steps.brief_count.outputs.current_count }}
          PREV_COUNT: ${{ steps.previous_count.outputs.count }}

      - name: Get Export Count
        id: export_count
        if: |
          steps.context.outputs.workflow_name == 'Export Latest News' &&
          steps.context.outputs.status == 'success'
        run: |
          # Count articles in latest.json from qa-news repo
          # Since we don't have direct access to qa-news artifacts, check the GitHub API
          # Note: the Contents API line-wraps base64 content at 60 chars, so strip
          # newlines before decoding or @base64d fails on the embedded line breaks.
          # Export schema is { date, updatedAt, items: Article[] } (see
          # src/business-logic/export-latest-news.ts) — field is 'items', not 'articles'.
          EXPORT_COUNT=$(gh api repos/rciesielski3/qa-news/contents/public/latest.json \
            --jq '.content | gsub("\n"; "") | @base64d | fromjson | .items | length' 2>/dev/null || echo 0)

          echo "count=$EXPORT_COUNT" >> $GITHUB_OUTPUT
          echo "Export count: $EXPORT_COUNT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Send Smart Success Notification (Export)
        if: |
          steps.context.outputs.workflow_name == 'Export Latest News' &&
          steps.context.outputs.status == 'success' &&
          env.ENABLE_NOTIFICATIONS == 'true'
        continue-on-error: true
        run: |
          # Always alert on success for export (it runs less frequently)
          if [ "$EXPORT_COUNT" -eq 0 ]; then
            MESSAGE="⚠️ Export: 0 articles exported (check export logic)"
          else
            MESSAGE="✅ Export: $EXPORT_COUNT articles exported to qa-news"
          fi

          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode="HTML"
        env:
          # Same env-var pattern as the Daily Brief notification step above,
          # to avoid splicing a step output directly into the script.
          EXPORT_COUNT: ${{ steps.export_count.outputs.count }}

      - name: Update Previous Article Count
        if: |
          steps.context.outputs.workflow_name == 'Daily Brief' &&
          steps.context.outputs.status == 'success'
        run: |
          echo "Updating PREV_ARTICLE_COUNT to $CURRENT_COUNT"
          # Attempt to persist the count as a repository variable so the next
          # run's "Get Previous Article Count" step can read it back via
          # vars.PREV_ARTICLE_COUNT.
          #
          # KNOWN LIMITATION: `gh variable set` requires a token with
          # repository "Variables: write" permission. The default
          # GITHUB_TOKEN does NOT carry this scope — GitHub Actions has no
          # `permissions:` entry that grants it, it can only come from a
          # fine-grained PAT or GitHub App installation token. Until such a
          # token is added as a secret (e.g. REPO_VARS_TOKEN) and wired in
          # below, this call will fail with 403 and the threshold-based
          # comparison in the notification step will keep treating
          # PREV_COUNT as 0 on every run (i.e. it always notifies, treating
          # every run as a 100% change) instead of doing real comparisons.
          # continue-on-error below keeps that documented no-op from failing
          # the job.
          gh variable set PREV_ARTICLE_COUNT --body "$CURRENT_COUNT" --repo "${{ github.repository }}"
        continue-on-error: true
        env:
          CURRENT_COUNT: ${{ steps.brief_count.outputs.current_count }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Failure Alert
        if: |
          steps.context.outputs.status == 'failure' &&
          env.ENABLE_NOTIFICATIONS == 'true'
        continue-on-error: true
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="⚠️ Workflow failed: ${{ steps.context.outputs.workflow_name }}" \
            -d parse_mode="HTML"
