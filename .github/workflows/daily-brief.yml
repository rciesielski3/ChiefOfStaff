name: Daily Brief

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs at 08:00 UTC daily and commits changes to the main repository.
# The export-latest-news.yml workflow depends on this workflow completing within
# 5 minutes (export-latest-news starts at 08:05 UTC).
#
# Known race condition: If Daily Brief takes longer than 5 minutes or encounters
# network issues, the dependent export workflow may start before this workflow completes,
# resulting in:
# - Export workflow reading stale data from the knowledge layer
# - Merge conflicts when export-latest-news.yml attempts concurrent pushes to qa-news
# - Potential data inconsistencies between canonical articles and exported news
#
# Current mitigation: Auth-based push handling minimizes conflicts. The 5-minute
# buffer between workflow starts provides time for completion. Workflow execution time
# should be monitored in production to ensure consistent completion within the buffer.
# Consider implementing:
# - Workflow sequencing via gh workflow run --wait (future enhancement)
# - Locking mechanism for canonical articles writes (future enhancement)

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/cli/daily-brief.ts

      - name: Commit articles
        run: |
          git config user.name "PAIOS Bot"
          git config user.email "bot@paios.local"
          git add data/canonical_articles.ndjson
          git commit -m "chore: update canonical articles from daily brief" || true

      - name: Push to remote (with auth)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD:main
