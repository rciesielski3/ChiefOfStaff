name: Daily Brief

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs at 08:00 UTC, 5 minutes before export-latest-news.yml (08:05 UTC).
# The 5-minute gap provides a buffer to allow the Daily Brief to complete and push
# its changes before export-latest-news begins. However, a race condition exists if:
# 1. Daily Brief takes longer than 5 minutes to complete
# 2. Both workflows push conflicting changes simultaneously
#
# Current mitigation: The 5-minute delay provides time for completion.
# This is a known limitation and should be monitored for in production logs.

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/cli/daily-brief.ts

      - name: Commit articles
        run: |
          git config user.name "PAIOS Bot"
          git config user.email "bot@paios.local"
          git add data/canonical_articles.ndjson
          git commit -m "chore: update canonical articles from daily brief" || true

      - name: Push to remote (with auth)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD:main
