name: Daily Brief

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-brief-${{ github.ref }}
  cancel-in-progress: false

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs at 08:00 UTC daily and updates the knowledge layer.
# It uses a pull request + auto-merge strategy to minimize latency before M4 export.
#
# Race condition mitigation strategy:
# 1. Creates a PR instead of pushing directly to main
# 2. Auto-merge ensures minimal latency between M3→M4 transition
# 3. PR merge is observed by export-latest-news.yml via workflow_run trigger
#
# This ensures:
# - M3 (Daily Brief) completes cleanly with a code review gate
# - M4 (Export Latest News) is triggered AFTER M3 completes successfully
# - No stale data reads in export workflow
# - Proper sequencing prevents merge conflicts and data inconsistencies

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/cli/daily-brief.ts

      - name: Commit changes
        run: |
           git config user.name "PAIOS Bot"
           git config user.email "bot@paios.local"
           git add data/canonical_articles.ndjson
           git commit -m "chore: update canonical articles from daily brief" || exit 0

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
           token: ${{ secrets.GITHUB_TOKEN }}
           commit-message: "chore: update canonical articles from daily brief"
           title: "chore: update canonical articles"
           body: "Automated update from Daily Brief workflow."
           branch: "automation/daily-brief"
           delete-branch: true

      - name: Enable auto-merge
        run: |
          gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on Failure (manual runs only)
        if: failure() && github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="⚠️ Workflow failed: ${{ github.workflow }}"
