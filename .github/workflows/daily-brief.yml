name: Daily Brief

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-brief-${{ github.ref }}
  cancel-in-progress: false

# RACE CONDITION ACKNOWLEDGEMENT:
# This workflow runs at 08:00 UTC daily and updates the knowledge layer.
# It uses a pull request + auto-merge strategy to minimize latency before M4 export.
#
# Race condition mitigation strategy:
# 1. Creates a PR instead of pushing directly to main
# 2. Auto-merge ensures minimal latency between M3→M4 transition
# 3. PR merge is observed by export-latest-news.yml via workflow_run trigger
#
# This ensures:
# - M3 (Daily Brief) completes cleanly with a code review gate
# - M4 (Export Latest News) is triggered AFTER M3 completes successfully
# - No stale data reads in export workflow
# - Proper sequencing prevents merge conflicts and data inconsistencies

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    env:
      ENABLE_NOTIFICATIONS: true
    outputs:
      extraction_failed: ${{ steps.verify-extraction.outcome != 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Brief
        run: npx ts-node src/cli/daily-brief.ts

      - name: Verify Extraction Prerequisites
        if: always()
        run: |
          test -n "${{ secrets.ANTHROPIC_API_KEY }}" || (echo "ANTHROPIC_API_KEY not configured" && exit 1)
          test -f "data/canonical_articles.ndjson" || (echo "canonical_articles.ndjson not found" && exit 1)
          echo "Extraction prerequisites verified"

      - name: Extract Knowledge Facts
        if: always()
        id: extract
        run: |
          echo "Starting knowledge fact extraction..."
          npx ts-node src/cli/extract-knowledge.ts
          echo "✅ Knowledge extraction completed successfully"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRACT_COUNT: 20
          ARTICLES_PATH: data/canonical_articles.ndjson
          KNOWLEDGE_FACTS_PATH: data/knowledge_facts.ndjson
          CLASSIFIER_CACHE_PATH: data/classifier-cache.json

      - name: Verify Extraction Output
        id: verify-extraction
        if: always()
        run: |
          if [ ! -f "data/knowledge_facts.ndjson" ]; then
            echo "❌ CRITICAL: knowledge_facts.ndjson not found after extraction"
            exit 1
          fi

          FACT_COUNT=$(wc -l < data/knowledge_facts.ndjson || echo 0)

          if [ "$FACT_COUNT" -eq 0 ]; then
            echo "❌ CRITICAL: Extraction produced 0 facts"
            exit 1
          fi

          echo "✅ Extraction verification: $FACT_COUNT facts extracted"

      - name: Run knowledge evolution
        if: always()
        id: evolve
        run: |
          echo "Starting knowledge evolution..."
          npx ts-node src/scripts/evolve-knowledge.ts || echo "⚠️  Knowledge evolution encountered warnings but continuing"
          echo "✅ Knowledge evolution step completed"
        env:
          INPUT_FACTS: data/knowledge_facts.ndjson
          OUTPUT_FACTS: data/knowledge_facts.ndjson
          EMBEDDINGS_CACHE: data/fact_embeddings.ndjson
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Validate evolved facts
        if: always()
        run: |
          if [ ! -f "data/knowledge_facts.ndjson" ]; then
            echo "⚠️  Facts file not found after evolution, but continuing"
            exit 0
          fi

          FACT_COUNT=$(wc -l < data/knowledge_facts.ndjson || echo 0)

          if [ "$FACT_COUNT" -eq 0 ]; then
            echo "⚠️  No facts available after evolution, but continuing"
            exit 0
          fi

          echo "✅ Facts validation: $FACT_COUNT facts ready for processing"

      - name: Generate insights
        if: always()
        id: generate-insights
        run: |
          echo "Starting insight generation pipeline..."
          npx ts-node src/cli/generate-insights.ts
          echo "✅ Insight generation completed successfully"
        env:
          KNOWLEDGE_FACTS_PATH: data/knowledge_facts.ndjson
          INSIGHTS_PATH: data/insights.ndjson
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check insights generated
        if: always()
        run: |
          if [ ! -f "data/insights.ndjson" ]; then
            echo "⚠️  Insights file not found (pipeline may have skipped due to no facts)"
            exit 0
          fi

          INSIGHT_COUNT=$(wc -l < data/insights.ndjson || echo 0)
          echo "✅ Insights generated: $INSIGHT_COUNT insights"

      - name: Report insights
        if: success()
        run: |
          npx ts-node src/cli/report-insights.ts >> /tmp/insights-summary.txt
          cat /tmp/insights-summary.txt
        continue-on-error: true

      - name: Commit changes
        run: |
           git config user.name "PAIOS Bot"
           git config user.email "bot@paios.local"
           git add data/canonical_articles.ndjson
           git add -f data/knowledge_facts.ndjson || true
           git commit -m "chore: update articles and knowledge facts from daily brief" || exit 0

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
           token: ${{ secrets.GITHUB_TOKEN }}
           commit-message: "chore: update canonical articles from daily brief"
           title: "chore: update canonical articles"
           body: "Automated update from Daily Brief workflow."
           branch: "automation/daily-brief"
           delete-branch: true

      - name: Enable auto-merge
        run: |
          gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow summary
        if: always()
        run: |
          echo "Daily Brief Workflow Summary:"
          echo "- Extraction: ${{ steps.verify-extraction.outcome }}"
          echo "- Evolution: ${{ steps.evolve.outcome }}"
          echo "- Insights: ${{ steps.generate-insights.outcome }}"
          echo "✅ Workflow completed (failures non-blocking)"

      - name: Log Article Count
        id: count
        run: |
          ARTICLE_COUNT=$(wc -l < data/canonical_articles.ndjson || echo 0)
          echo "count=$ARTICLE_COUNT" >> $GITHUB_OUTPUT
          echo "Articles fetched: $ARTICLE_COUNT"

      - name: Create Extraction Status File
        if: always()
        run: |
          echo "${{ steps.verify-extraction.outcome }}" > /tmp/extraction_status.txt
          echo "Extraction status: ${{ steps.verify-extraction.outcome }}"

      - name: Upload Article Count Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-count-data
          path: data/canonical_articles.ndjson
          retention-days: 1

      - name: Upload Extraction Status Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-status
          path: /tmp/extraction_status.txt
          retention-days: 1
