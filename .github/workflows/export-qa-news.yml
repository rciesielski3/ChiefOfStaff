name: Export QA-News Data

permissions:
  contents: write

# WORKFLOW SYNCHRONIZATION STRATEGY:
# This workflow waits for Daily Brief PR to merge before exporting.
#
# Trigger: workflow_run on Daily Brief completion
# Race condition: Daily Brief creates PR + auto-merge (async), but export-qa-news
#                 triggers immediately when Daily Brief completes
# Solution: PR merge polling step waits for actual merge before data read
#
# Flow:
# 1. Daily Brief completes, outputs PR_NUMBER to workflow outputs
# 2. export-qa-news triggered by workflow_run event
# 3. Wait-for-PR-merge step polls GitHub API (backoff: 2s→128s, timeout: 5m)
# 4. Once merged, proceed with export using updated canonical_articles.ndjson
#
# Failure modes:
# - PR number not available: skip wait, proceed anyway (graceful degradation)
# - PR not merged after 5 min: fail workflow (operator intervention needed)
# - Articles still 0 after merge: export fails with diagnostics, operator debugs

on:
  workflow_run:
    workflows: ["Daily Brief"]
    types:
      - completed
  workflow_dispatch:

jobs:
  export-qa-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ChiefofStaff repository
        uses: actions/checkout@v4

      - name: Wait for PR merge
        run: |
          # Query GitHub API for latest PR from daily-brief workflow
          # The daily-brief workflow creates PRs with branch "automation/daily-brief"
          PR_NUMBER=$(gh api repos/rciesielski3/ChiefOfStaff/pulls \
            --jq '.[] | select(.head.ref == "automation/daily-brief") | .number' \
            --limit 1 | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "⚠️  No daily-brief PR found, skipping wait"
            exit 0
          fi

          .github/scripts/wait-for-pr-merge.sh "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Daily Brief Status
        if: github.event.workflow_run.conclusion == 'failure'
        run: exit 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Export latest news
        run: npx ts-node src/cli/export-latest-news.ts

      - name: Export weekly highlights
        run: npx ts-node src/cli/export-weekly-highlights.ts

      - name: Export monthly recap
        run: npx ts-node src/cli/export-monthly-recap.ts

      - name: Validate exports in data directory
        run: |
          set -e

          echo "Validating latest-news.json in data directory..."
          jq '.' qa-news/data/latest-news.json > /dev/null || exit 1

          echo "Validating weekly-highlights.json in data directory..."
          jq '.' qa-news/data/weekly-highlights.json > /dev/null || exit 1

          echo "Validating monthly-recap.json in data directory..."
          jq '.' qa-news/data/monthly-recap.json > /dev/null || exit 1

          echo "All JSON files are valid in data directory"
          echo ""

          LATEST_COUNT=$(jq '.items | length' qa-news/data/latest-news.json)
          WEEKLY_COUNT=$(jq '[.weeks[].items[]] | length' qa-news/data/weekly-highlights.json)
          MONTHLY_COUNT=$(jq '[.months[].items[]] | length' qa-news/data/monthly-recap.json)

          echo "Article counts:"
          echo "  Latest: $LATEST_COUNT articles"
          echo "  Weekly: $WEEKLY_COUNT articles"
          echo "  Monthly: $MONTHLY_COUNT articles"

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          git add qa-news/data/latest-news.json qa-news/data/weekly-highlights.json qa-news/data/monthly-recap.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "data: update qa-news daily/weekly/monthly exports

Generated from latest RSS articles:
- latest-news.json: Top 50 articles
- weekly-highlights.json: All articles grouped by week
- monthly-recap.json: Top 25 articles per month"

          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Push to main branch
        if: steps.commit.outputs.changed == 'true'
        run: |
          git push origin main

      - name: Verify sync completed
        run: |
          echo "Export QA-News Data workflow completed successfully"
          echo "Synced files:"
          ls -lh qa-news/data/*.json
