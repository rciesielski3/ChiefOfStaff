version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WORKFLOWS_DEFAULT_NAME_PREFIX=
      - GENERIC_TIMEZONE=UTC
      - N8N_API_GATEWAY_AUTH=none
      - N8N_ENABLE_AUTHORIZATION=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ${PWD}:/home/node/project
    networks:
      - n8n_network

networks:
  n8n_network:
    driver: bridge

volumes:
  n8n_data:
