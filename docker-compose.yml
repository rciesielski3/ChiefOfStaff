services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-paios}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-paios}
      - POSTGRES_DB=${POSTGRES_DB:-paios}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WORKFLOWS_DEFAULT_NAME_PREFIX=
      - GENERIC_TIMEZONE=UTC
      - N8N_API_GATEWAY_AUTH=none
      - N8N_ENABLE_AUTHORIZATION=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-paios}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-paios}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-paios}
    volumes:
      - n8n_data:/home/node/.n8n
      - ${PWD}:/home/node/project
    networks:
      - n8n_network

networks:
  n8n_network:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
